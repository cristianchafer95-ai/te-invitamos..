<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<title>Bautismo</title>

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  color:#eaeaea;
  background:#000;
  overflow-x:hidden;
}

/* ===== ESTRELLAS ===== */
.stars, .stars2, .stars3 {
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
}

/* pequeñas */
.stars {
  background:
    radial-gradient(1px 1px at 10% 20%, #fff, transparent),
    radial-gradient(1px 1px at 30% 80%, #fff, transparent),
    radial-gradient(1px 1px at 70% 40%, #fff, transparent),
    radial-gradient(1px 1px at 90% 60%, #fff, transparent),
    radial-gradient(1px 1px at 50% 10%, #fff, transparent),
    radial-gradient(1px 1px at 25% 35%, #fff, transparent),
    radial-gradient(1px 1px at 65% 75%, #fff, transparent);
  animation: moveStars 80s linear infinite;
}

/* medias */
.stars2 {
  background:
    radial-gradient(1.5px 1.5px at 20% 50%, #fff, transparent),
    radial-gradient(1.5px 1.5px at 60% 70%, #fff, transparent),
    radial-gradient(1.5px 1.5px at 80% 20%, #fff, transparent),
    radial-gradient(1.5px 1.5px at 35% 15%, #fff, transparent);
  animation: moveStars 120s linear infinite;
}

/* brillantes */
.stars3 {
  background:
    radial-gradient(2px 2px at 40% 30%, #fff, transparent),
    radial-gradient(2px 2px at 75% 85%, #fff, transparent),
    radial-gradient(2px 2px at 15% 75%, #fff, transparent);
  animation: twinkle 3s infinite alternate;
}

@keyframes moveStars {
  from {transform:translateY(0);}
  to {transform:translateY(-200px);}
}

@keyframes twinkle {
  from {opacity:0.4;}
  to {opacity:1;}
}

/* ===== CONTENIDO ===== */
.container {
  max-width:420px;
  margin:auto;
  padding:40px 20px 20px;
  text-align:center;
}

h1 {
  font-size:12px;
  letter-spacing:3px;
  color:#c6a86b;
}

h2 {
  font-family:'Playfair Display', serif;
  font-size:34px;
  margin:10px 0;
  color:#f5e6c8;
}

.photo {
  width:180px;
  height:180px;
  border-radius:50%;
  object-fit:cover;
  margin:20px auto;
  border:2px solid #c6a86b;
  box-shadow:0 0 25px rgba(198,168,107,0.4);
}

.subtitle {
  color:#bbb;
  font-size:15px;
  margin-bottom:25px;
}

.card {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(198,168,107,0.3);
  margin-bottom:20px;
  opacity:0;
  transform:translateY(30px);
  transition:0.8s ease;
}

.btn {
  display:block;
  margin:10px auto;
  padding:14px;
  width:100%;
  border-radius:14px;
  text-decoration:none;
  color:#000;
  font-weight:500;
  background:linear-gradient(45deg,#c6a86b,#f5e6c8);
  box-shadow:0 6px 20px rgba(198,168,107,0.4);
  opacity:0;
  transform:translateY(30px);
  transition:0.8s ease;
}

.btn:hover {
  transform:scale(1.03);
}

.show {
  opacity:1;
  transform:translateY(0);
}

.scroll-indicator {
  font-size:12px;
  color:#888;
  margin-top:10px;
  animation:fade 2s infinite;
}

@keyframes fade {
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}
</style>
</head>

<body>

<!-- estrellas -->
<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>

<div class="container">

  <h1>TE INVITAMOS AL</h1>
  <h2>✨ Bautismo de Benjamin  ✨</h2>

  <img class="photo" src="benja2.jpeg">

  <p class="subtitle">
    Un momento único que queremos compartir con vos ✨
  </p>

  <div class="scroll-indicator">Deslizá ↓</div>

  <div class="card" id="card">
    <p>📅 26 de Abril</p>
    <p>⏰ 10:00 hs</p>
    <p>📍 Capilla Sagrada Familia</p>
  </div>

  <a class="btn" id="btn1" href="https://wa.me/5493513734169">
    Confirmar asistencia
  </a>

  <a class="btn" id="btn2" href="https://www.google.com/maps/place/Capilla+Sagrada+Familia/@-31.3925,-64.2305723,14.58z/data=!4m6!3m5!1s0x943298daaac9aa7b:0xe84d379f01adc063!8m2!3d-31.3902814!4d-64.2304304!16s%2Fg%2F11bysjsqqb?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D">
    Cómo llegar
  </a>

</div>

<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

observer.observe(document.getElementById('card'));
observer.observe(document.getElementById('btn1'));
observer.observe(document.getElementById('btn2'));
</script>

</body>
</html>
